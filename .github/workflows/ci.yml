name: 🧪 BlackRoad Models CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  test:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: 📦 Install tool dependencies
        run: pip install pyyaml pytest

      - name: 🧪 Run unit tests
        run: pytest tests/ -v --tb=short

  lint:
    name: Lint (Python)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 📦 Install linting tools
        run: pip install flake8

      - name: 🔍 Lint tools/
        run: flake8 tools/ --max-line-length=120 --extend-ignore=E501,F401,F541

      - name: 🔍 Lint evals/
        run: flake8 evals/ --max-line-length=120 --extend-ignore=E501,F401,F541

      - name: 🔍 Lint research/ Python files
        run: flake8 research/ --max-line-length=120 --extend-ignore=E501,F401,F541
